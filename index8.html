    if (tab === 'consult')  initConsult();
  }

            쇼핑하러 가기
          </a>
        </div>`;
      return;
    }

    grid.innerHTML = items.map(p => `
      <div class="group cursor-pointer">
        <div class="aspect-[4/5] bg-surface-container-low rounded-xl overflow-hidden relative mb-3">
          <a href="index5.html?id=${p.id}" class="block w-full h-full">
            <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"/>
          </a>
          <div class="absolute bottom-3 right-3 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="addToCartFromWishlist(${p.id})" title="장바구니 담기"
              class="w-9 h-9 rounded-full flex items-center justify-center shadow-md"
              style="background:#ffffff;color:#4a6545;">
              <span class="material-symbols-outlined" style="font-size:18px;">shopping_cart</span>
            </button>
            <button onclick="removeWishlist(${p.id})" title="위시리스트 제거"
              class="w-9 h-9 rounded-full flex items-center justify-center shadow-md"
              style="background:#ffffff;">
              <span class="material-symbols-outlined" style="font-size:16px;color:#e53935;font-variation-settings:'FILL' 1,'wght' 400;">favorite</span>
            </button>
          </div>
        </div>
        <div class="flex justify-between items-start">
          <div>
            <p class="text-base font-semibold text-primary">${p.name}</p>
            <p class="text-xs text-on-surface-variant mt-0.5">${p.label}</p>
          </div>
          <p class="text-sm font-bold text-primary">₩${p.price.toLocaleString()}</p>
        </div>
      </div>`).join('');
  }

  function addToCartFromWishlist(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p) return;
    if (typeof NHJCart !== 'undefined') {
      NHJCart.addItem({ id: p.id, name: p.name, priceNum: p.price, price: p.price, img: p.img, size: 'Medium' });
      if (typeof NHJToast !== 'undefined') NHJToast.show(p.name + '을(를) 장바구니에 담았어요 🌿');
    }
  }

  function removeWishlist(id) {
    let list = JSON.parse(localStorage.getItem('nhj-wishlist') || '[]');
    list = list.filter(i => i !== String(id));
    localStorage.setItem('nhj-wishlist', JSON.stringify(list));
    renderWishlist();
    if (typeof NHJToast !== 'undefined') NHJToast.show('위시리스트에서 제거했어요');
  }

  // 주문 내역
  // ───────── 1:1 상담 (티켓 방식: 접수 → 1분 뒤 답변) ─────────
  const CONSULT_KEY = '';  // Gemini 키 넣으면 매크로 외 질문은 AI가 답변
  const CONSULT_MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite'];
  const REPLY_DELAY = 60 * 1000;  // 답변 도착까지 1분 (데모용. 실서비스는 더 길게)

  const CONSULT_MACRO = [
    { kw: ['배송', '며칠', '얼마나 걸', '언제'], a: '주문 후 평균 2~3일 내에 배송됩니다 🚚 10만원 이상 구매 시 무료 배송이며, 제주·도서산간은 1~2일 더 소요될 수 있어요. 배송 현황은 [주문/배송 조회] 탭에서 실시간으로 확인하실 수 있습니다.' },
    { kw: ['교환', '반품', '환불', '취소'], a: '상품 수령 후 7일 이내 교환·반품이 가능해요 📦 단순 변심은 왕복 배송비가 부과되며, 식물 상태 이상은 무료로 처리해드립니다.' },
    { kw: ['보증', '죽', '시들', '하자'], a: '모든 식물은 수령 후 2주간 무상 보증이 적용돼요 🌿 정상적으로 관리했는데도 문제가 생기면 사진과 함께 문의주시면 재배송 또는 환불해드립니다.' },
    { kw: ['결제', '카드', '무통장', '계좌'], a: '신용카드, 계좌이체, 간편결제(카카오페이·네이버페이)를 지원해요 💳 결제 오류 시 잠시 후 다시 시도하시거나 다른 수단을 이용해주세요.' },
    { kw: ['포장', '선물', '래핑'], a: '선물 포장 서비스를 제공하고 있어요 🎁 주문 시 요청사항에 적어주시면 정성껏 포장해드리고, 메시지 카드도 함께 넣어드려요.' },
    { kw: ['물', '햇빛', '노래', '벌레', '분갈이', '비료'], a: '식물 관리 문의 주셨네요 🌱 햇빛은 밝은 그늘, 물은 겉흙이 마르면 듬뿍 주는 게 기본이에요. 구체적인 증상을 알려주시면 더 자세히 안내해드릴게요!' },
  ];

  function _macro(text) {
    for (const m of CONSULT_MACRO) if (m.kw.some(k => text.includes(k))) return m.a;
    return null;
  }

  async function _consultAI(text) {
    const prompt = `당신은 식물 쇼핑몰 'Natural Harmony Journey'의 친절한 고객 상담사입니다. 고객 문의에 정중하고 따뜻하게 3~4문장으로 답하세요. 쇼핑몰·식물 관련 질문에만 답하고 무관한 질문은 정중히 안내하세요. 한국어, 이모지 적절히 사용.\n\n고객 문의: ${text}`;
    for (const model of CONSULT_MODELS) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${CONSULT_KEY}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 400 } }),
        });
        if (!res.ok) continue;
        const data = await res.json();
        const out = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (out) return out;
      } catch (e) { console.error('상담 AI 오류:', e); }
    }
    return null;
  }

  function _loadInquiries() {
    try { return JSON.parse(localStorage.getItem('nhj-inquiries') || '[]'); } catch { return []; }
  }
  function _saveInquiries(list) {
    localStorage.setItem('nhj-inquiries', JSON.stringify(list));
  }

  const CAT_LABEL = { 배송:'배송 문의', 교환반품:'교환·반품', 품질:'품질·보증', 결제:'결제 문의', 식물관리:'식물 관리', 기타:'기타 문의' };

  async function submitInquiry() {
    const cat  = document.getElementById('consult-category').value;
    const text = document.getElementById('consult-text').value.trim();
    if (!text) {
      if (typeof NHJToast !== 'undefined') NHJToast.show('문의 내용을 입력해주세요.', 'error');
      return;
    }

    const inquiries = _loadInquiries();
    const id = Date.now();
    inquiries.push({
      id, category: cat, question: text,
      answer: null, status: 'pending',
      createdAt: new Date().toLocaleString('ko-KR'),
    });
    _saveInquiries(inquiries);
    document.getElementById('consult-text').value = '';
    if (typeof NHJToast !== 'undefined') NHJToast.show('문의가 접수되었어요! 잠시 후 답변이 도착해요 🌿');
    renderInquiries();

    // 답변 생성 (매크로 우선, 없으면 AI) → REPLY_DELAY 후 반영
    let answer = _macro(text);
    if (!answer && CONSULT_KEY && CONSULT_KEY.trim()) answer = await _consultAI(text);
    if (!answer) answer = '문의 주셔서 감사합니다 🌿 담당 상담사가 확인 후 순차적으로 답변드리고 있어요. 조금만 기다려주세요!';

    setTimeout(() => {
      const list = _loadInquiries();
      const item = list.find(i => i.id === id);
      if (item) { item.answer = answer; item.status = 'answered'; _saveInquiries(list); }
      const panel = document.getElementById('panel-consult');
      if (panel && panel.style.display !== 'none') renderInquiries();
      if (typeof NHJToast !== 'undefined') NHJToast.show('상담 답변이 도착했어요! 💬');
    }, REPLY_DELAY);
  }

  function renderInquiries() {
    const list = _loadInquiries().slice().reverse();
    const box  = document.getElementById('inquiry-list');
    if (!box) return;

    if (list.length === 0) {
      box.innerHTML = `<div class="flex flex-col items-center py-12 text-on-surface-variant">
        <span class="material-symbols-outlined mb-3 opacity-30" style="font-size:42px;">chat</span>
        <p class="text-sm">아직 문의 내역이 없어요</p>
      </div>`;
      return;
    }

    box.innerHTML = list.map(q => {
      const answered = q.status === 'answered';
      return `
      <div class="rounded-xl border border-outline-variant/20 p-5 card">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold px-3 py-1 rounded-full bg-secondary-container text-primary">${CAT_LABEL[q.category] || q.category}</span>
          <span class="text-xs font-bold px-3 py-1 rounded-full" style="${answered
            ? 'background:rgba(74,101,69,.12);color:#4a6545;'
            : 'background:rgba(232,163,61,.15);color:#c8821a;'}">
            ${answered ? '✓ 답변 완료' : '⏳ 답변 대기중'}
          </span>
        </div>
        <div class="flex gap-2 mb-3">
          <span class="material-symbols-outlined text-primary" style="font-size:18px;flex-shrink:0;">help</span>
          <div class="flex-1">
            <p class="text-sm text-on-surface" style="white-space:pre-wrap;">${q.question}</p>
            <p class="text-xs text-on-surface-variant mt-1">${q.createdAt}</p>
          </div>
        </div>
        ${answered ? `
        <div class="flex gap-2 pt-3 mt-1 border-t border-outline-variant/20">
          <span class="material-symbols-outlined" style="font-size:18px;flex-shrink:0;color:#4a6545;">support_agent</span>
          <div class="flex-1">
            <p class="text-xs font-bold text-primary mb-1">상담사 답변</p>
            <p class="text-sm text-on-surface" style="white-space:pre-wrap;line-height:1.6;">${q.answer}</p>
          </div>
        </div>` : `
        <div class="pt-3 mt-1 border-t border-outline-variant/20">
          <p class="text-xs text-on-surface-variant flex items-center gap-1.5">
            <span class="material-symbols-outlined" style="font-size:14px;">schedule</span>
            상담사가 답변을 준비하고 있어요. 잠시만 기다려주세요.
          </p>
        </div>`}
      </div>`;
    }).join('');
  }

  // 대기중 문의 답변 복원 (페이지 새로 열었을 때 시간 지난 것 처리)
  function _restorePending() {
    const list = _loadInquiries();
    let changed = false;
    list.forEach(q => {
      if (q.status === 'pending' && Date.now() - q.id >= REPLY_DELAY) {
        let answer = _macro(q.question);
        if (!answer) answer = '문의 주셔서 감사합니다 🌿 담당 상담사가 확인했어요. 추가 문의는 언제든 남겨주세요!';
        q.answer = answer; q.status = 'answered'; changed = true;
      }
    });
    if (changed) _saveInquiries(list);
  }

  function initConsult() {
    _restorePending();
    renderInquiries();
  }

  // 배송 단계 계산 (주문 시각 기준 — 데모용: 분 단위)
  function getDeliveryStatus(orderId) {
    const elapsed = (Date.now() - orderId) / 1000 / 60; // 경과 분
    if (elapsed < 1)  return { step: 0, label: '결제 완료',   color: '#73796f' };
    if (elapsed < 3)  return { step: 1, label: '상품 준비중', color: '#e8a33d' };
    if (elapsed < 10) return { step: 2, label: '배송중',      color: '#4a6545' };
    return                   { step: 3, label: '배송 완료',   color: '#4a6545' };
  }

  const DELIVERY_STEPS = [
    { icon: 'payments',       label: '결제완료' },
    { icon: 'inventory_2',    label: '상품준비' },
    { icon: 'local_shipping', label: '배송중' },
    { icon: 'check_circle',   label: '배송완료' },
  ];

  function renderOrders() {
    const orders = JSON.parse(localStorage.getItem('nhj-orders') || '[]');
    const list   = document.getElementById('orders-list');

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="flex flex-col items-center py-20 text-on-surface-variant">
          <span class="material-symbols-outlined mb-4 opacity-30" style="font-size:48px;">receipt_long</span>
          <p class="text-base font-semibold">주문 내역이 없어요</p>
          <p class="text-sm mt-1">첫 주문을 해보세요</p>
          <a href="index4.html" class="mt-6 px-6 py-3 bg-primary text-white rounded-lg text-sm font-semibold hover:opacity-90 transition-all">
            쇼핑하러 가기
          </a>
        </div>`;
      return;
    }

    list.innerHTML = orders.slice().reverse().map(o => {
      const st = getDeliveryStatus(o.id);
      return `
      <div class="rounded-xl border border-outline-variant/20 bg-surface-container-low card overflow-hidden">
        <!-- 주문 헤더 (클릭 토글) -->
        <div class="p-6 cursor-pointer" onclick="toggleOrderTrack(${o.id})">
          <div class="flex justify-between items-center mb-4">
            <span class="text-xs text-on-surface-variant">${o.date} · 주문번호 ${String(o.id).slice(-8)}</span>
            <span class="text-xs font-bold px-3 py-1 rounded-full" style="background:${st.color}1a;color:${st.color};">${st.label}</span>
          </div>
          <div class="flex flex-col gap-3">
            ${o.items.map(i => `
              <div class="flex gap-3 items-center">
                <img src="${i.img}" class="w-14 h-14 rounded-lg object-cover bg-surface-container"/>
                <div class="flex-1">
                  <p class="text-sm font-semibold">${i.name}</p>
                  <p class="text-xs text-on-surface-variant">${i.size} · ${i.qty}개</p>
                </div>
                <p class="text-sm font-bold text-primary">₩${(i.price * i.qty).toLocaleString()}</p>
              </div>`).join('')}
          </div>
          <div class="flex justify-between items-center mt-4 pt-4 border-t border-outline-variant/20">
            <span class="text-sm text-on-surface-variant">총 결제금액</span>
            <span class="text-base font-bold text-primary">₩${o.total.toLocaleString()}</span>
          </div>
          <div class="flex items-center justify-center gap-1 mt-3 text-xs text-on-surface-variant">
            <span>배송 조회</span>
            <span class="material-symbols-outlined order-chevron" id="chevron-${o.id}" style="font-size:16px;transition:transform .3s;">expand_more</span>
          </div>
        </div>

        <!-- 배송 추적 (펼침) -->
        <div id="track-${o.id}" style="display:none;" class="px-6 pb-6">
          <div class="pt-5 border-t border-outline-variant/20">
            <div class="flex items-center justify-between relative">
              <!-- 진행 라인 -->
              <div class="absolute left-0 right-0 top-5 h-0.5 bg-outline-variant/30" style="z-index:0;"></div>
              <div class="absolute left-0 top-5 h-0.5 transition-all duration-500" style="z-index:0;background:#4a6545;width:${(st.step / 3) * 100}%;"></div>
              ${DELIVERY_STEPS.map((s, idx) => {
                const done   = idx <= st.step;
                return `
                <div class="flex flex-col items-center gap-2" style="z-index:1;position:relative;">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300"
                    style="background:${done ? '#4a6545' : 'var(--step-bg, #efeded)'};color:${done ? '#fff' : '#9ba298'};">
                    <span class="material-symbols-outlined" style="font-size:20px;${done ? "font-variation-settings:'FILL' 1;" : ''}">${s.icon}</span>
                  </div>
                  <span class="text-[11px] font-semibold" style="color:${done ? '#4a6545' : '#9ba298'};">${s.label}</span>
                </div>`;
              }).join('')}
            </div>
            ${st.step === 3
              ? '<p class="text-center text-xs text-on-surface-variant mt-5">🎉 배송이 완료되었어요! 식물과 함께 행복한 시간 보내세요.</p>'
              : `<p class="text-center text-xs text-on-surface-variant mt-5">예상 도착: ${new Date(o.id + 1000*60*60*24*3).toLocaleDateString('ko-KR')}</p>`
            }
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function toggleOrderTrack(id) {
    const track   = document.getElementById('track-' + id);
    const chevron = document.getElementById('chevron-' + id);
    if (!track) return;
    const open = track.style.display === 'none';
    track.style.display = open ? 'block' : 'none';
    if (chevron) chevron.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  }

  // 정보 저장
  function saveSettings() {
    const name  = document.getElementById('edit-name').value.trim();
    const email = document.getElementById('edit-email').value.trim();
    const phone = document.getElementById('edit-phone').value.trim();
    const pw    = document.getElementById('edit-pw').value;
    const pwc   = document.getElementById('edit-pw-confirm').value;

    if (!name || !email) {
      if (typeof NHJToast !== 'undefined') NHJToast.show('이름과 이메일은 필수예요.', 'error');
      return;
    }
    if (pw && pw !== pwc) {
      if (typeof NHJToast !== 'undefined') NHJToast.show('비밀번호가 일치하지 않아요.', 'error');
      return;
    }

    const users = JSON.parse(localStorage.getItem('nhj-users') || '[]');
    const idx   = users.findIndex(u => u.email === session.email);
    if (idx !== -1) {
      users[idx].name  = name;
      users[idx].email = email;
      users[idx].phone = phone;
      if (pw) users[idx].password = pw;
      localStorage.setItem('nhj-users', JSON.stringify(users));
    }

    const newSession = { ...session, name, email, phone };
    localStorage.setItem('nhj-session', JSON.stringify(newSession));
    document.getElementById('profile-name').textContent  = name;
    document.getElementById('profile-email').textContent = email;
    document.getElementById('edit-pw').value = '';
    document.getElementById('edit-pw-confirm').value = '';

    if (typeof NHJToast !== 'undefined') NHJToast.show('정보가 저장됐어요 ✓');
  }

  // 로그아웃
  function handleLogout() {
    localStorage.removeItem('nhj-session');
    location.href = 'index.html';
  }

  // 회원 탈퇴
  function deleteAccount() {
    const users = JSON.parse(localStorage.getItem('nhj-users') || '[]');
    const filtered = users.filter(u => u.email !== session.email);
    localStorage.setItem('nhj-users', JSON.stringify(filtered));
    localStorage.removeItem('nhj-session');
    location.href = 'index.html';
  }

  // 초기 렌더 — 주문/배송 조회를 기본으로
  renderOrders();
  </script>

  <script src="nhj-dark.js"></script>
  <script src="nhj-header.js"></script>
  <script src="nhj-chat.js"></script>
</body>
</html>
