    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Pretendard', sans-serif; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in   { animation: fadeUp 0.6s ease-out forwards; }
        .fade-in-2 { animation: fadeUp 0.6s ease-out 0.15s both; }
        .fade-in-3 { animation: fadeUp 0.6s ease-out 0.3s both; }

        /* ── 스크롤 Reveal ── */
        @media (prefers-reduced-motion: no-preference) {
            [data-reveal] {
                opacity: 0; transform: translateY(24px); filter: blur(3px);
                transition: opacity .6s ease, transform .6s cubic-bezier(.22,1,.36,1), filter .6s ease;
            }
            [data-reveal][data-delay="1"] { transition-delay:.1s; }
            [data-reveal][data-delay="2"] { transition-delay:.2s; }
            [data-reveal][data-delay="3"] { transition-delay:.3s; }
            [data-reveal].revealed { opacity:1; transform:translateY(0); filter:blur(0); }
        }

        /* ── 구매 버튼 pulse ── */
        @keyframes purchasePulse {
            0%,100% { box-shadow: 0 4px 20px rgba(74,101,69,.25); }
            50%      { box-shadow: 0 8px 32px rgba(74,101,69,.45); }
        }
        .btn-purchase-pulse { animation: purchasePulse 2.5s ease-in-out infinite; }

        /* ── 히어로 이미지 Ken Burns ── */
        @keyframes kenBurns {
            0%   { transform: scale(1)    translateX(0); }
            100% { transform: scale(1.06) translateX(-1%); }
        }
        #plant-img { animation: kenBurns 12s ease-in-out infinite alternate; }

        /* ── 다크모드 ── */
        html.dark .bg-tertiary-container\/20   { background-color:rgba(74,101,69,.15) !important; }
        html.dark .border-tertiary-container\/30 { border-color:rgba(106,148,100,.2) !important; }
        html.dark .text-tertiary               { color:#6a9464 !important; }
        html.dark .text-on-tertiary-container  { color:rgba(180,196,175,.85) !important; }
        .tip-title { color: #1b1c1c; }
        html.dark .tip-title { color: #e0eadc !important; }

        /* ══════════════════════════════════════════
           수정 1: 특징 섹션 아이콘 정렬
           items-start → items-center + 멀티라인 대응
        ══════════════════════════════════════════ */
        /* ── 특징 행: 아이콘 중심 ↔ "특징" 제목 텍스트 중심 정렬 ──
           구조: [아이콘 | 특징 제목] 을 같은 flex row로 묶고
                 설명 텍스트는 아이콘 폭(48px)+gap(16px) 만큼 들여쓰기        */
        .feature-row {
            display: flex;
            flex-direction: column;   /* 헤더 행 + 설명 텍스트를 세로 배치 */
            gap: 4px;
        }
        .feature-header {
            display: flex;
            align-items: center;      /* 아이콘 박스 중심 = h3 한 줄 중심 */
            gap: 16px;
        }
        .feature-icon-wrap {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: #dbe5d8;
            border-radius: 10px;
        }
        .feature-desc {
            /* 아이콘(48px) + gap(16px) = 64px 들여쓰기 → 제목 텍스트 시작점과 정렬 */
            padding-left: 64px;
            min-width: 0;
        }

        /* ══════════════════════════════════════════
           팁 카드 공통: 클릭 가능 표시 + overflow 격리
        ══════════════════════════════════════════ */
        .tip-card {
            position: relative;
            overflow: hidden;          /* 애니메이션이 카드 밖으로 넘치지 않음 */
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: box-shadow .2s;
        }
        .tip-card:hover {
            box-shadow: 0 6px 24px -4px rgba(74,101,69,.18);
        }
        /* 카드 내 텍스트/아이콘은 항상 애니메이션 위에 표시 */
        .tip-card .tip-content {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        /* ══════════════════════════════════════════
           공통 애니메이션 캔버스 레이어
        ══════════════════════════════════════════ */
        .anim-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            will-change: opacity;
        }

        /* ══════════════════════════════════════════
           수정 2: 권장 조도 — 태양 + 광선 + Lens Flare
        ══════════════════════════════════════════ */
        @keyframes sunMove {
            0%   { transform: translate(0, 0)          scale(0.35); opacity: 0; }
            12%  { opacity: 1; }
            100% { transform: translate(260px, -145px) scale(1.05); opacity: 1; }
        }
        @keyframes rayExpand {
            0%   { opacity: 0;   transform: translate(0, 0)          scale(0.3) rotate(0deg); }
            15%  { opacity: 0.8; }
            100% { opacity: 0.9; transform: translate(257px, -142px) scale(1.1) rotate(18deg); }
        }
        @keyframes flareAppear {
            0%,30% { opacity: 0; transform: scale(0.2); }
            60%    { opacity: 0.6; transform: scale(1.1); }
            100%   { opacity: 0.5; transform: scale(1); }
        }
        @keyframes animFadeOut {
            0%   { opacity: 1; }
            100% { opacity: 0; }
        }

        .sun-body {
            position: absolute;
            bottom: 12px; left: 12px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe066 40%, #ffb300 100%);
            box-shadow: 0 0 24px 8px rgba(255,200,0,.45);
            animation: sunMove 1.5s cubic-bezier(.2,.8,.4,1) forwards;
            will-change: transform, opacity;
        }
        .sun-rays {
            position: absolute;
            bottom: 6px; left: 6px;
            width: 56px; height: 56px;
            animation: rayExpand 1.5s cubic-bezier(.2,.8,.4,1) forwards;
            will-change: transform, opacity;
        }
        /* 약 225deg(좌하) ± 22deg 범위로 두 줄 광선 */
        .sun-rays::before { transform: translate(-50%, -50%) rotate(210deg); }
        .sun-rays::after  { transform: translate(-50%, -50%) rotate(238deg); }
        .sun-flare {
            position: absolute;
            border-radius: 50%;
            animation: flareAppear 1.5s ease forwards;
            will-change: transform, opacity;
        }

        /* ══════════════════════════════════════════
           수정 3: 수분 관리 — 빗방울 낙하
        ══════════════════════════════════════════ */
        @keyframes dropFall {
            0%   { transform: translateY(-12px) scaleY(1); opacity: 0; }
            10%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(120px)  scaleY(1.2); opacity: 0; }
        }
        .rain-drop {
            position: absolute;
            top: 0;
            border-radius: 50% 50% 60% 60%;
            background: linear-gradient(180deg, rgba(100,180,255,.85) 0%, rgba(60,140,220,.6) 100%);
            will-change: transform, opacity;
            animation: dropFall linear forwards;
        }

        /* ══════════════════════════════════════════
           수정 4: 적정 온도 — 냉온 충돌 → 균형
        ══════════════════════════════════════════ */
        @keyframes coldPush {
            0%   { transform: translateX(-100%); opacity: 0.7; }
            45%  { transform: translateX(-5%);   opacity: 0.7; }
            55%  { transform: translateX(-5%);   opacity: 0; }
            100% { transform: translateX(-5%);   opacity: 0; }
        }
        @keyframes hotPush {
            0%   { transform: translateX(100%);  opacity: 0.7; }
            45%  { transform: translateX(5%);    opacity: 0.7; }
            55%  { transform: translateX(5%);    opacity: 0; }
            100% { transform: translateX(5%);    opacity: 0; }
        }
        /* warmSpread: 중앙에서 타원형 radial 확산 → 경계가 부드럽게 번지는 효과 */
        @keyframes warmSpread {
            0%,38%  { transform: scale(0);    opacity: 0; }
            52%     { transform: scale(0.55); opacity: 0.72; }
            72%     { transform: scale(1);    opacity: 0.68; }
            100%    { transform: scale(1.05); opacity: 0.65; }
        }
        .temp-cold {
            position: absolute;
            inset: 0;
            /* 왼쪽 남색 — 우측 끝은 투명하게 자연스럽게 이음 */
            background: linear-gradient(90deg, #1a3a6b 0%, #3b6ec7 55%, rgba(80,130,220,0) 100%);
            animation: coldPush 1.5s cubic-bezier(.4,0,.2,1) forwards;
            will-change: transform, opacity;
        }
        .temp-hot {
            position: absolute;
            inset: 0;
            /* 오른쪽 빨강 — 좌측 끝은 투명하게 자연스럽게 이음 */
            background: linear-gradient(90deg, rgba(220,60,20,0) 0%, #e05020 45%, #b01010 100%);
            animation: hotPush 1.5s cubic-bezier(.4,0,.2,1) forwards;
            will-change: transform, opacity;
        }
        .temp-warm {
            position: absolute;
            inset: -20%;          /* 약간 크게 잡아 경계가 카드 끝에서 자연스럽게 페이드 */
            /* Radial gradient: 중앙 짙은 주황 → 외곽 밝은 주황 → 투명
               타원형으로 퍼지므로 카드 전체를 덮으면서 경계가 부드럽게 번짐 */
            background: radial-gradient(ellipse 70% 80% at center,
                rgba(255,175,30,.82)  0%,
                rgba(255,155,20,.70) 30%,
                rgba(255,135,10,.48) 55%,
                rgba(255,120, 5,.20) 78%,
                transparent          100%
            );
            transform-origin: center;
            animation: warmSpread 1.5s cubic-bezier(.3,0,.2,1) forwards;
            will-change: transform, opacity;
        }

    <script>
    /* ════════════════════════════════════════════════════════
       카드 애니메이션 — 클릭 전용, 중복 방지, 2초 후 자동 제거
    ════════════════════════════════════════════════════════ */

    /**
     * 공통 헬퍼: 애니메이션 레이어를 초기화하고
     * 1.5s 진행 후 0.5s fade-out, 2s 후 완전 제거
     */
    function _prepLayer(layerId) {
        const layer = document.getElementById(layerId);
        if (!layer) return null;
        // 이미 실행 중이면 중단하고 재시작
        layer.innerHTML = '';
        layer.style.opacity = '1';
        layer.style.transition = 'none';
        clearTimeout(layer._fadeTimer);
        clearTimeout(layer._removeTimer);
        return layer;
    }

    function _scheduleRemove(layer) {
        // 1.5s 후 fade-out 시작
        layer._fadeTimer = setTimeout(() => {
            layer.style.transition = 'opacity 0.5s ease';
            layer.style.opacity = '0';
        }, 1500);
        // 2s 후 DOM 비우기
        layer._removeTimer = setTimeout(() => {
            layer.innerHTML = '';
            layer.style.opacity = '1';
            layer.style.transition = 'none';
        }, 2000);
    }

    /* ──────────────────────────────────────────
       수정 2: 권장 조도 — 태양 등장 + 광선 + Lens Flare
    ────────────────────────────────────────── */
    function playLightAnim(card) {
        const layer = _prepLayer('anim-light');
        if (!layer) return;

        // 태양 광선 그룹
        const raysEl = document.createElement('div');
        raysEl.className = 'sun-rays';
        layer.appendChild(raysEl);

        // 태양 본체
        const sunEl = document.createElement('div');
        sunEl.className = 'sun-body';
        layer.appendChild(sunEl);

        // Lens Flare 3개 — 태양 최종 위치(우상단) 근방에 배치
        // 태양 최종 bottom ≈ 155px(12+145), left ≈ 270px(12+260) 기준으로 오프셋
        const flares = [
            { size:20, bottom:148, left:248, color:'rgba(255,240,120,.60)', delay:'0.35s' },
            { size:11, bottom:175, left:278, color:'rgba(255,255,200,.75)', delay:'0.65s' },
            { size:26, bottom:130, left:265, color:'rgba(255,200,80,.40)',  delay:'0.85s' },
        ];
        flares.forEach(f => {
            const fl = document.createElement('div');
            fl.className = 'sun-flare';
            fl.style.cssText = `
                width:${f.size}px; height:${f.size}px;
                bottom:${f.bottom}px; left:${f.left}px;
                background:radial-gradient(circle, ${f.color} 0%, transparent 70%);
                animation-delay:${f.delay};
            `;
            layer.appendChild(fl);
        });

        _scheduleRemove(layer);
    }

    /* ──────────────────────────────────────────
       수정 3: 수분 관리 — 다양한 물방울 낙하
    ────────────────────────────────────────── */
    function playWaterAnim(card) {
        const layer = _prepLayer('anim-water');
        if (!layer) return;

        // 물방울 12개 — 크기·위치·속도 무작위
        const COUNT = 12;
        for (let i = 0; i < COUNT; i++) {
            const drop = document.createElement('div');
            drop.className = 'rain-drop';

            const size    = 5 + Math.random() * 9;          // 5~14px
            const left    = 5 + Math.random() * 88;         // 5~93% 범위
            const dur     = 0.5 + Math.random() * 0.7;      // 0.5~1.2s 낙하 시간
            const delay   = Math.random() * 1.0;             // 0~1s 시작 지연
            const opacity = 0.55 + Math.random() * 0.35;    // 0.55~0.9

            drop.style.cssText = `
                width:${size}px;
                height:${size * 1.4}px;
                left:${left}%;
                opacity:${opacity};
                animation-duration:${dur}s;
                animation-delay:${delay}s;
            `;
            layer.appendChild(drop);
        }

        _scheduleRemove(layer);
    }

    /* ──────────────────────────────────────────
       수정 4: 적정 온도 — 냉온 충돌 → 주황 균형
    ────────────────────────────────────────── */
    function playTempAnim(card) {
        const layer = _prepLayer('anim-temp');
        if (!layer) return;

        // 차가운 남색 (왼쪽에서 밀려옴)
        const cold = document.createElement('div');
        cold.className = 'temp-cold';
        layer.appendChild(cold);

        // 따뜻한 빨간색 (오른쪽에서 밀려옴)
        const hot = document.createElement('div');
        hot.className = 'temp-hot';
        layer.appendChild(hot);

        // 충돌 후 중앙에서 퍼지는 주황색
        const warm = document.createElement('div');
        warm.className = 'temp-warm';
        layer.appendChild(warm);

        _scheduleRemove(layer);
    }
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); io.unobserve(e.target); }});
            }, { threshold: 0.10, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));
        }
        const buyBtn = document.getElementById('btn-purchase');
        if (buyBtn) buyBtn.classList.add('btn-purchase-pulse');
    });
    </script>
