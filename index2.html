    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Pretendard', sans-serif; }

        /* ── 선택 활성 ── */
        .option-active {
            background-color: #4a6545 !important;
            border-color: #4a6545 !important;
            transform: scale(0.98);
            box-shadow: 0 4px 20px -4px rgba(74, 101, 69, 0.35) !important;
        }
        .option-active h3, .option-active p,
        .option-active span { color: white !important; }
        .option-active .icon-wrap { background-color: rgba(255,255,255,0.15) !important; }

        /* ── 옵션 카드 hover ── */
        button[id^="opt-"] {
            transition: transform .35s cubic-bezier(.34,1.56,.64,1),
                        box-shadow .35s ease,
                        border-color .25s ease,
                        background-color .25s ease;
        }
        button[id^="opt-"]:not(.option-active):hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 12px 32px -8px rgba(74,101,69,.18);
            border-color: rgba(168,198,159,.5);
        }
        button[id^="opt-"]:not(.option-active):hover .icon-wrap {
            background-color: #dbe5d8 !important;
        }
        button[id^="opt-"]:not(.option-active):hover .icon-wrap .material-symbols-outlined {
            transform: scale(1.12);
        }
        .icon-wrap .material-symbols-outlined {
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
        }

        button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        /* ── 로딩 오버레이 식물 애니 ── */
        @keyframes leafSway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(var(--rot)) scale(1.02); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-leaf { animation: leafSway var(--speed) ease-in-out infinite; transform-origin: bottom center; }
        .animate-float { animation: float 4s ease-in-out infinite; }

        /* ── 질문 전환 ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.45s ease-out forwards; }

        /* ── 진행바 ── */
        #progress-bar { transition: width .7s cubic-bezier(.22,1,.36,1); }

        /* ── 다크모드 ── */

        html.dark button[id^="opt-"]:not(.option-active) {
            background-color: #181f19 !important;
            border-color: rgba(106,148,100,.12) !important;
        }
        html.dark button[id^="opt-"]:not(.option-active):hover {
            border-color: rgba(106,148,100,.35) !important;
            box-shadow: 0 12px 32px -8px rgba(0,0,0,.4);
        }
        html.dark button[id^="opt-"]:not(.option-active) .icon-wrap {
            background-color: #253028 !important;
        }
        html.dark button[id^="opt-"]:not(.option-active):hover .icon-wrap {
            background-color: rgba(106,148,100,.18) !important;
        }
        html.dark .option-active { background-color: #6a9464 !important; border-color: #6a9464 !important; }
        html.dark .option-active h3,
        html.dark .option-active p,
        html.dark .option-active span { color: #111712 !important; }

        /* ── 테스트 페이지 전용 레이아웃 ── */

        /* 전체 페이지: 헤더 제외 영역이 최소 viewport 높이 확보 → 푸터 첫 화면 미노출 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #nhj-header { flex-shrink: 0; }

        /* 메인: 남은 높이 차지 → 테스트 카드가 뷰포트 안에 담김 */
        #test-main {
            flex: 1 0 auto;
            display: flex;
            align-items: flex-start;      /* 화면 중앙보다 약간 위 */
            justify-content: center;
            padding-top: clamp(32px, 5vh, 64px);
            padding-bottom: clamp(32px, 5vh, 64px);
            padding-left: 24px;
            padding-right: 24px;
            min-height: calc(100vh - 64px); /* 헤더 높이(~64px) 제외한 full viewport */
        }

        /* 테스트 카드 컨테이너 — 독서에 최적화된 폭 */
        #test-card {
            width: 100%;
            max-width: 760px;             /* 700~900px 권장 중 760px 선택 */
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* 진행 헤더 */
        #test-progress-header {
            margin-bottom: 28px;
        }

        /* 질문 제목 가독성 */
        #question-title {
            line-height: 1.4;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        /* 선택지 카드: 풀필 버전 — 더 컴팩트하게 */
        button[id^="opt-"] {
            padding: 20px 28px !important;
            border-radius: 16px !important;    /* pill → card 형태로 */
            gap: 20px !important;
        }

        /* 아이콘 크기 소폭 축소 — 카드가 컴팩트해지면서 비율 유지 */
        .icon-wrap {
            width: 56px !important;
            height: 56px !important;
            flex-shrink: 0;
        }
        .icon-wrap .material-symbols-outlined {
            font-size: 28px !important;
        }

        /* 선택지 라벨 */
        button[id^="opt-"] h3 {
            font-size: clamp(16px, 2.2vw, 22px) !important;
            line-height: 1.4 !important;
            word-break: keep-all;
        }

        /* 선택지 간격 */
        #options-grid {
            gap: 12px !important;
        }

        /* 네비게이션 버튼 영역 */
        #nav-section {
            margin-top: 32px;
        }

        /* 푸터: flex 마지막 요소로 자연스럽게 스크롤 후 등장 */
        footer[data-nhj-footer], footer {
            flex-shrink: 0;
        }

        /* ── 반응형 ── */
        @media (max-width: 767px) {
            #test-main {
                padding-top: 24px;
                padding-bottom: 24px;
                padding-left: 16px;
                padding-right: 16px;
                min-height: calc(100vh - 60px);
                align-items: flex-start;
            }
            button[id^="opt-"] {
                padding: 16px 20px !important;
                border-radius: 14px !important;
                gap: 16px !important;
            }
            .icon-wrap {
                width: 48px !important;
                height: 48px !important;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            #test-main {
                padding-top: clamp(28px, 4vh, 48px);
                min-height: calc(100vh - 64px);
            }
        }

                <button id="next-btn" onclick="goNext()"
                    style="display:flex;align-items:center;gap:6px;padding:12px 28px;border:none;border-radius:10px;background:#4a6545;color:#fff;font-size:14px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;transition:background .2s;box-shadow:0 4px 16px rgba(74,101,69,.28);white-space:nowrap;"
                    onmouseover="this.style.background='#3a5235'"
                    onmouseout="this.style.background='#4a6545'">
                    <span id="next-text">다음 질문</span>
                    <span id="next-icon" class="material-symbols-outlined" style="font-size:17px;">arrow_forward</span>
                </button>
            </section>

        </div><!-- /test-card -->
    </main>

    <footer data-nhj-footer></footer>

    <script>
        const quizData = [
            { q: "1. 나의 휴일 아침 풍경은?",           a: ["주변을 정리하고 바삐 움직인다", "한참을 누워 여유를 즐긴다"],           icons: ["energy_savings_leaf", "spa"] },
            { q: "2. 새로운 물건을 살 때 더 설레는 포인트는?", a: ["기분 좋아지는 아름다운 외관", "삶의 질을 높여주는 똑똑한 성능"], icons: ["local_florist", "potted_plant"] },
            { q: "3. 내가 꿈꾸는 나만의 아지트는?",       a: ["시야가 탁 트인 넓은 거실", "소품들로 꽉 찬 아늑한 다락방"],       icons: ["grass", "forest"] },
            { q: "4. 영화나 책을 볼 때 내가 더 선호하는 장르는?", a: ["반전과 빠른 전개의 이야기", "여운이 남는 잔잔한 이야기"], icons: ["yard", "nature"] }
        ];

        let currentStep = 0;
        let userAnswers = [];

        function renderStep() {
            const quiz = quizData[currentStep];
            document.getElementById('question-title').innerText = quiz.q;
            document.getElementById('label-0').innerText = quiz.a[0];
            document.getElementById('label-1').innerText = quiz.a[1];
            document.getElementById('icon-0').innerText = quiz.icons[0];
            document.getElementById('icon-1').innerText = quiz.icons[1];
            document.getElementById('step-display').innerText = `Step ${currentStep + 1} of ${quizData.length}`;

            const pct = ((currentStep + 1) / quizData.length) * 100;
            document.getElementById('progress-percent').innerText = `${Math.round(pct)}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            resetOptionStyles();
            if (userAnswers[currentStep] !== undefined) {
                document.getElementById(`opt-${userAnswers[currentStep]}`).classList.add('option-active');
            }

            document.getElementById('prev-btn').disabled = (currentStep === 0);

            const isLast = currentStep === quizData.length - 1;
            document.getElementById('next-text').innerText = isLast ? "결과 분석하기" : "다음 질문";
            document.getElementById('next-icon').innerText = isLast ? "analytics" : "arrow_forward";

            const grid = document.getElementById('options-grid');
            grid.classList.remove('fade-up');
            void grid.offsetWidth;
            grid.classList.add('fade-up');
        }

        function resetOptionStyles() {
            document.querySelectorAll('button[id^="opt-"]').forEach(btn => btn.classList.remove('option-active'));
        }

        function handlePick(idx) {
            userAnswers[currentStep] = idx;
            resetOptionStyles();
            document.getElementById(`opt-${idx}`).classList.add('option-active');
            setTimeout(goNext, 350);
        }

        function goNext() {
            if (userAnswers[currentStep] === undefined) return;
            if (currentStep < quizData.length - 1) {
                currentStep++;
                renderStep();
            } else {
                startLoading();
            }
        }

        function goPrev() {
            if (currentStep > 0) { currentStep--; renderStep(); }
        }

        function startLoading() {
            const resultKey = userAnswers.join("");
            const overlay = document.createElement('div');
            const isDark = document.documentElement.classList.contains('dark');
            overlay.className = "fixed inset-0 z-[100] flex flex-col items-center justify-center";
            overlay.style.backgroundColor = isDark ? '#111712' : '#fbf9f8';
            overlay.innerHTML = `
                <div class="animate-float flex flex-col items-center">
                    <div class="relative w-32 h-28">
                        <svg class="animate-leaf absolute" style="--rot:-6deg;--speed:3s;left:10px;bottom:10px;" width="70" height="90" viewBox="0 0 70 90">
                            <path d="M35 90C35 90 0 60 0 30C0 13.4 15.7 0 35 0C54.3 0 70 13.4 70 30C70 60 35 90 35 90Z" fill="${isDark ? '#6a9464' : '#4a6545'}" fill-opacity="0.6"/>
                        </svg>
                        <svg class="animate-leaf absolute" style="--rot:6deg;--speed:3.5s;right:5px;bottom:5px;" width="80" height="100" viewBox="0 0 80 100">
                            <path d="M40 100C65 85 80 60 80 35C80 15.7 62.1 0 40 0C17.9 0 0 15.7 0 35C0 60 15 85 40 100Z" fill="${isDark ? '#6a9464' : '#4a6545'}"/>
                        </svg>
                    </div>
                </div>
                <div class="mt-10 text-center">
                    <h2 style="color:${isDark ? '#6a9464' : '#4a6545'}" class="text-[24px] font-semibold mb-2">공간의 조화를 분석 중입니다</h2>
                    <p style="color:${isDark ? 'rgba(180,196,175,.55)' : '#73796f'}" class="text-[16px]">잠시만 기다려 주세요...</p>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => { location.href = `index3.html?id=${resultKey}`; }, 3000);
        }

        renderStep();
    </script>
    <script src="nhj-dark.js"></script>
    <script src="nhj-header.js"></script>
  <script src="nhj-chat.js"></script>
</body>
</html>
